<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Engineer | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
  --bg:#fff;
  --card:#f5f5f5;
  --text:#0a0e27;
  --sub:#666;
  --accent:#00d9ff;
}

body.dark{
  --bg:#0a0e27;
  --card:#11152c;
  --text:#fff;
  --sub:#aaa;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:var(--bg);color:var(--text);transition:.3s}

header{
  display:flex;justify-content:space-between;
  padding:20px 50px;align-items:center;
}

nav a{
  margin:0 15px;text-decoration:none;
  color:var(--sub);
}
nav a:hover{color:var(--accent)}

.toggle{
  cursor:pointer;font-size:18px;
}

.hero{
  text-align:center;padding:100px 20px;
}
.hero h1{
  font-size:3rem;font-weight:700;
}
.hero span{color:var(--accent)}
.hero p{color:var(--sub)}

.section{
  padding:60px 20px;text-align:center;
}

.cards{
  display:flex;flex-wrap:wrap;
  justify-content:center;gap:20px;
}

.card{
  background:var(--card);
  padding:20px;border-radius:15px;
  width:250px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 20px var(--accent);
}

footer{
  text-align:center;padding:20px;
  color:var(--sub);
}
</style>
</head>

<body>

<header>
  <h2>Portfolio</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Skills</a>
    <a href="#">Projects</a>
  </nav>
  <div class="toggle" onclick="toggleTheme()">
    <i class="fa-solid fa-moon"></i>
  </div>
</header>

<section class="hero">
  <h1>Hi, I'm <span>Naveen</span></h1>
  <p>Data Engineer | AI Enthusiast</p>
</section>

<section class="section">
  <h2>Skills</h2>
  <div class="cards">
    <div class="card">Python</div>
    <div class="card">SQL</div>
    <div class="card">Power BI</div>
    <div class="card">Tableau</div>
  </div>
</section>

<footer>
  © 2026 Naveen
</footer>

<script>
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark")?"dark":"light");
}

window.onload=()=>{
  if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark");
  }
}
</script>

</body>
</html>
